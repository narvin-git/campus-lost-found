<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 - Page Not Found</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>Campus Lost & Found</h1>
          <small>Page not found</small>
        </div>
      </div>
      <a class="btn btn-ghost" href="index.html">Home</a>
    </div>
  </header>

  <main class="container">
    <section class="card" style="text-align:center; padding:28px;">
      <h2 style="font-size:20px; margin-bottom:10px;">404 - Page Not Found</h2>
      <p class="section-note" style="max-width:520px; margin:0 auto 16px;">
        The page you’re trying to access doesn’t exist or was moved.
      </p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <a class="btn btn-primary" href="index.html">Go to Home</a>
        <a class="btn btn-ghost" href="javascript:history.back()">Go Back</a>
      </div>
      <p class="footer-note">Tip: Use the Home page to view reports and search items.</p>
    </section>
  </main>
</body>
</html>
